<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Multi-container status</title>
    <style>
      :root { font-family: Georgia, "Times New Roman", serif; color: #262320; background: #f5f1e8; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      main { width: min(660px, 100%); padding: clamp(28px, 6vw, 56px); background: #fffdf8; border: 1px solid #d8cfbe; border-top: 6px solid #b55335; box-shadow: 8px 9px 0 #d8cfbe; }
      .eyebrow { margin: 0 0 28px; color: #755e4b; font-family: ui-monospace, monospace; font-size: .78rem; letter-spacing: .08em; text-transform: uppercase; }
      h1 { max-width: 14ch; margin: 0; font-size: clamp(2.35rem, 7vw, 4.5rem); font-weight: 500; line-height: .98; letter-spacing: -.055em; }
      .intro { max-width: 52ch; margin: 28px 0 0; color: #5d554d; font-size: 1.08rem; line-height: 1.65; }
      code { background: #ede5d6; padding: .1em .3em; }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Flask + PostgreSQL / custom Docker network</p>
      <h1>Two containers, one application.</h1>
      <p class="intro">The Flask service uses the PostgreSQL container name for DNS. Visit <code>/database</code> to verify the database connection and initialization.</p>
    </main>
  </body>
</html>
