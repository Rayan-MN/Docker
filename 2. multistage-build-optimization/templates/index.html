<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Container status</title>
    <style>
      :root { font-family: Georgia, "Times New Roman", serif; color: #262320; background: #f5f1e8; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background-image: linear-gradient(135deg, #ede5d6 25%, transparent 25%), linear-gradient(225deg, #ede5d6 25%, transparent 25%); background-size: 28px 28px; }
      main { width: min(660px, 100%); padding: clamp(28px, 6vw, 56px); background: #fffdf8; border: 1px solid #d8cfbe; border-top: 6px solid #b55335; box-shadow: 8px 9px 0 #d8cfbe; }
      .eyebrow { margin: 0 0 28px; color: #755e4b; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .78rem; letter-spacing: .08em; text-transform: uppercase; }
      h1 { max-width: 14ch; margin: 0; font-size: clamp(2.35rem, 7vw, 4.5rem); font-weight: 500; line-height: .98; letter-spacing: -.055em; }
      .intro { max-width: 52ch; margin: 28px 0 0; color: #5d554d; font-size: 1.08rem; line-height: 1.65; }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">2. multistage build optimization / flask service</p>
      <h1>Container is up and doing its job.</h1>
      <p class="intro">A small Flask app served by Gunicorn. Its image is built in two stages so the production container contains only what it needs to run.</p>
    </main>
  </body>
</html>
